name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create env.js from secrets
        run: |
          cat > env.js <<'EOF'
          export const SUPABASE_CONFIG = {
              url: '${{ secrets.SUPABASE_URL }}',
              key: '${{ secrets.SUPABASE_KEY }}',
          };
          EOF

      # Add your build / deploy steps here, for example:
      # - name: Install deps
      #   run: npm ci
      # - name: Build
      #   run: npm run build
      # - name: Deploy
      #   run: npm run deploy
